<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOV to GIF</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.02em; }

    #drop-zone {
      width: 100%;
      max-width: 480px;
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    #drop-zone.over {
      border-color: #7c6af7;
      background: rgba(124, 106, 247, 0.08);
    }

    #drop-zone p { color: #888; font-size: 0.9rem; margin-top: 8px; }

    #drop-zone input { display: none; }

    #status {
      font-size: 0.85rem;
      color: #aaa;
      min-height: 20px;
      text-align: center;
    }

    #progress-bar-wrap {
      width: 100%;
      max-width: 480px;
      background: #222;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      display: none;
    }

    #progress-bar {
      height: 100%;
      background: #7c6af7;
      width: 0%;
      transition: width 0.3s;
    }

    #output { display: none; flex-direction: column; align-items: center; gap: 12px; }

    #output img {
      max-width: 480px;
      max-height: 400px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    a.download-btn {
      background: #7c6af7;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    a.download-btn:hover { background: #6a59e0; }
  </style>
</head>
<body>
  <h1>MOV → GIF</h1>

  <div id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p>Drop a .mov file here<br>or click to browse</p>
    <input type="file" id="file-input" accept=".mov,video/quicktime">
  </div>

  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>

  <div id="status">Loading ffmpeg...</div>

  <div id="output">
    <img id="gif-preview" src="" alt="converted gif">
    <a class="download-btn" id="download-link" href="#" download="output.gif">Download GIF</a>
  </div>

  <script type="module">
    import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
    import { fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';

    const ffmpeg = new FFmpeg();
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status');
    const progressWrap = document.getElementById('progress-bar-wrap');
    const progressBar = document.getElementById('progress-bar');
    const output = document.getElementById('output');
    const gifPreview = document.getElementById('gif-preview');
    const downloadLink = document.getElementById('download-link');

    try {
      status.textContent = 'Loading ffmpeg...';
      await ffmpeg.load({
        classWorkerURL: `${location.origin}/ffmpeg/worker.js`,
        coreURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
        wasmURL: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.wasm',
      });
    } catch (err) {
      status.textContent = `Failed to load ffmpeg: ${err.message}`;
      console.error(err);
      throw err;
    }

    ffmpeg.on('progress', ({ progress }) => {
      progressBar.style.width = `${Math.round(progress * 100)}%`;
    });

    status.textContent = 'Ready — drop a .mov file';

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    async function handleFile(file) {
      if (!file) return;

      output.style.display = 'none';
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';
      status.textContent = `Converting ${file.name}...`;

      try {
        await ffmpeg.writeFile('input.mov', await fetchFile(file));

        await ffmpeg.exec([
          '-i', 'input.mov',
          '-vf', 'fps=15,scale=640:-1:flags=lanczos,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse',
          '-loop', '0',
          'output.gif'
        ]);

        const data = await ffmpeg.readFile('output.gif');
        const blob = new Blob([data.buffer], { type: 'image/gif' });
        const url = URL.createObjectURL(blob);

        gifPreview.src = url;
        downloadLink.href = url;
        downloadLink.download = file.name.replace(/\.mov$/i, '.gif');
        output.style.display = 'flex';
        status.textContent = 'Done!';
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        console.error(err);
      }

      progressWrap.style.display = 'none';
    }
  </script>
</body>
</html>
